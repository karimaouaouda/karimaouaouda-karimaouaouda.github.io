name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_MEDIA_BUCKET: ${{ vars.NEXT_PUBLIC_SUPABASE_MEDIA_BUCKET || 'portfolio-media' }}
          NEXT_PUBLIC_SUPABASE_CV_BUCKET: ${{ vars.NEXT_PUBLIC_SUPABASE_CV_BUCKET || 'portfolio-cv' }}
          NEXT_PUBLIC_CV_FALLBACK_URL: ${{ vars.NEXT_PUBLIC_CV_FALLBACK_URL || '/cv/Karim_Aouaouda_CV.pdf' }}
          NEXT_PUBLIC_SUPABASE_CONTACT_FUNCTION_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_CONTACT_FUNCTION_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
